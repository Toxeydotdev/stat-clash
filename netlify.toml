[build]
base = "."
command = "npm run build"
publish = "dist/apps/web"

[build.environment]
NODE_VERSION = "24.14.0"
NPM_VERSION = "11.9.0"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
